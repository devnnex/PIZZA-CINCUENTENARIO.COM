<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell"></div>

  <div class="container">
    <section class="hero">
      <div class="hero-brand">
        <img src="images/pizza.png" alt="Pizza recien horneada" class="hero-pizza">
        <div class="hero-brand-copy">
          <span class="eyebrow">Pizza Cincuentenario</span>
          <strong>Pedidos</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <span class="section-kicker">Menu</span>
          <h2>Arma el pedido</h2>
        </div>
        <div class="total-pill" id="totalResumen">$0</div>
      </div>

      <div id="menu" class="menu-grid"></div>

      <div id="resumenPedido" class="order-summary hidden"></div>

      <div class="action-bar">
        <button class="primary-button" onclick="finalizarPedido()">Finalizar pedido</button>
      </div>

      <div id="clienteForm" class="cliente-form hidden">
        <div class="field-group">
          <label for="clienteNombre">Nombre del cliente</label>
          <input type="text" id="clienteNombre" placeholder="Escribe el nombre">
        </div>
        <button id="guardarBtn" class="primary-button" onclick="guardarPedido()">Guardar pedido</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <span class="section-kicker">Dashboard</span>
          <h2>Gestion de pedidos</h2>
        </div>
        <button class="secondary-button" onclick="cargarPedidos()">Actualizar</button>
      </div>

      <div class="dashboard-toolbar">
        <div class="field-group search-group">
          <label for="buscadorNombre">Buscar por nombre</label>
          <input type="text" id="buscadorNombre" placeholder="Ej. Laura">
        </div>
        <div class="field-group filter-group">
          <label for="filtroEstado">Filtrar por estado</label>
          <select id="filtroEstado">
            <option value="Todos">Todos</option>
            <option value="Preparacion">Preparacion</option>
            <option value="Despachada">Despachada</option>
            <option value="Olvidado">Olvidado</option>
          </select>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="dashboard-column">
          <div class="subsection-heading">
            <h3>Pedidos activos</h3>
            <span id="pedidosActivosCount" class="mini-pill">0</span>
          </div>
          <div id="pedidos" class="pedidos-list pedidos-scroll"></div>
        </div>

        <div class="dashboard-column">
          <div class="subsection-heading">
            <div>
              <h3>Despachadas</h3>
              <p id="despachadasResumen">Total generado: $0</p>
            </div>
          </div>
          <div id="despachadas" class="pedidos-list despachadas-scroll"></div>
        </div>
      </div>
    </section>
  </div>

  <div id="saveFeedback" class="save-feedback hidden" aria-live="polite" aria-hidden="true">
    <div class="feedback-card">
      <div class="loader-ring" id="loaderRing"></div>
      <div class="success-check hidden" id="successCheck">
        <svg viewBox="0 0 52 52" aria-hidden="true">
          <circle cx="26" cy="26" r="25"></circle>
          <path d="M14 27.5l8 8L38 19"></path>
        </svg>
      </div>
      <h3 id="feedbackTitle">Guardando pedido...</h3>
      <p id="feedbackMessage">Estamos enviando la informacion.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
